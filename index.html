<!DOCTYPE html>
<html>
<head>
    <title>Sachin ki Website</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            /* Yahan humne background color change kiya hai */
            background: linear-gradient(to right, #6a11cb, #2575fc); 
            color: white;
            margin-top: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
            color: #333;
            max-width: 400px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #2575fc;
            margin-bottom: 15px;
        }

        h1 { margin-bottom: 10px; }

        .social-links {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        .whatsapp { background-color: #25D366; }
        .instagram { background-color: #E1306C; }

        .btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="box">
        <img src="WhatsApp Image 2026-03-31 at 2.04.48 PM.jpeg" alt="Sachin" class="profile-pic">
        
        <h1>Hello, I'm Sachin! 🚀</h1>
        <p>Welcome to my official website.</p>

        <div class="social-links">
            <a href="https://wa.me/91XXXXXXXXXX" class="btn whatsapp" target="_blank">WhatsApp Me</a>
            
            <a href="https://instagram.com/your_username" class="btn instagram" target="_blank">Instagram</a>
        </div>
    </div>

</body>
</html>
