<!DOCTYPE html>
<html>
<head>
    <title>Sachin ki Website</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #f4f4f4; 
            margin-top: 50px;
        }
        h1 { color: #333; }
        p { color: #666; font-size: 1.2em; }
        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;

        }
        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #007bff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="WhatsApp Image 2026-03-31 at 2.04.48 PM.jpeg" alt="Sachin" class="profile-pic">
        <h1>Hello Sachin! 🚀</h1>
        <p>Ye meri pehli website hai jo ab live ho chuki hai.</p>
        <p>Maine apni photo bhi kamyabi se laga di hai!</p>
    </div>
</body>
</html>
