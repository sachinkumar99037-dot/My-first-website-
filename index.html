<script>
    function action(service) {
        let url = "";

        switch(service) {
            case 'Aadhaar Card':
                url = "https://myaadhaar.uidai.gov.in/";
                break;
            case 'PAN Card':
                url = "https://www.onlineservices.nsdl.com/paam/endUserRegisterContact.html";
                break;
            case 'Voter ID Card':
                url = "https://voters.eci.gov.in/";
                break;
            case 'Ayushman Card':
                url = "https://beneficiary.nha.gov.in/";
                break;
            case 'Ration Card':
                url = "https://nfsa.gov.in/portal/apply_ration_card";
                break;
            case 'Income Tax':
                url = "https://www.incometax.gov.in/";
                break;
            case 'Birth Certificate':
                url = "https://crsorgi.gov.in/";
                break;
            case 'Scholarship':
                url = "https://scholarships.gov.in/";
                break;
            case 'Online Form':
                url = "https://www.sarkariresult.com/";
                break;
            case 'Train Ticket':
                url = "https://www.irctc.co.in/";
                break;
            case 'WhatsApp':
                url = "https://wa.me/91YOURNUMBER"; // Yahan apna number dalein
                break;
            case 'Instagram':
                url = "https://instagram.com/yourusername"; // Yahan apna username dalein
                break;
            default:
                alert(service + " service jald hi chalu hogi!");
                return;
        }

        if(url) {
            window.open(url, '_blank');
        }
    }
</script>
