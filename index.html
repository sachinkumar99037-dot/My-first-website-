<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachin Digital Services</</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            text-align: center;
            transition: background 0.3s, color 0.3s;
        }

        /* Dark Mode Colors */
        body.dark-mode {
            background-color: #121212;
            color: white;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin-top: 10px;
            object-fit: cover;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #ddd;
        }

        /* Card in Dark Mode */
        body.dark-mode .card {
            background: #1e1e1e;
            border-color: #333;
        }

        body.dark-mode .card span {
            color: #e0e0e0;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #e7f3ff;
            border-color: #007bff;
        }

        body.dark-mode .card:hover {
            background: #2c2c2c;
        }

        .card span {
            font-weight: bold;
            color: #333;
            display: block;
            margin-top: 5px;
        }

        .footer-btns {
            margin-top: 30px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            margin: 5px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-whatsapp { background: #25d366; }
        .btn-insta { background: #e1306c; }

        /* Floating Dark Mode Button */
        .dark-mode-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        body.dark-mode .dark-mode-btn {
            background: #fff;
            color: #333;
        }
    </style>
</head>
<body>

    <button class="dark-mode-btn" onclick="toggleDarkMode()" id="modeBtn">🌙 Mode</button>

    <div class="header">
        <img src="WhatsApp Image 2026-03-31 at 2.04.48 PM.jpeg" alt="Sachin Boss" class="profile-img">
        <h1>Sachin Digital Services</h1>
        <p>Sabhi Sarkari Online Suvidhayein Ek Hi Jagah Par</p>
    </div>

    <div class="grid-container">
        <div class="card" onclick="action('Aadhaar Card')"><span>🆔 Aadhaar Card</span></div>
        <div class="card" onclick="action('PAN Card')"><span>💳 PAN Card</span></div>
        <div class="card" onclick="action('Voter ID Card')"><span>🗳️ Voter ID</span></div>
        <div class="card" onclick="action('Ayushman Card')"><span>🏥 Ayushman Card</span></div>
        <div class="card" onclick="action('Ration Card')"><span>🌾 Ration Card</span></div>
        <div class="card" onclick="action('Income Tax')"><span>💰 Income Tax</span></div>
        <div class="card" onclick="action('Birth Certificate')"><span>👶 Birth Cert.</span></div>
        <div class="card" onclick="action('Scholarship')"><span>🎓 Scholarship</span></div>
        <div class="card" onclick="action('Online Form')"><span>📝 Online Form</span></div>
        <div class="card" onclick="action('Train Ticket')"><span>🚂 Train Ticket</span></div>
    </div>

    <div class="footer-btns">
        <a href="#" class="btn btn-whatsapp" onclick="action('WhatsApp')">WhatsApp Chat</a>
        <a href="#" class="btn btn-insta" onclick="action('Instagram')">Instagram Profile</a>
    </div>

    <script>
        // Service Redirect Logic
        function action(service) {
            let url = "";
            switch(service) {
                case 'Aadhaar Card': url = "https://myaadhaar.uidai.gov.in/"; break;
                case 'PAN Card': url = "https://www.onlineservices.nsdl.com/paam/endUserRegisterContact.html"; break;
                case 'Voter ID Card': url = "https://voters.eci.gov.in/"; break;
                case 'Ayushman Card': url = "https://beneficiary.nha.gov.in/"; break;
                case 'Ration Card': url = "https://nfsa.gov.in/portal/apply_ration_card"; break;
                case 'Income Tax': url = "https://www.incometax.gov.in/"; break;
                case 'Birth Certificate': url = "https://crsorgi.gov.in/"; break;
                case 'Scholarship': url = "https://scholarships.gov.in/"; break;
                case 'Online Form': url = "https://www.sarkariresult.com/"; break;
                case 'Train Ticket': url = "https://www.irctc.co.in/"; break;
                case 'WhatsApp': url = "https://wa.me/9693786453"; break; 
                case 'Instagram': url = "https://instagram.com/sachinkumar"; break;
                default: alert("Jald hi upalabdha hoga!"); return;
            }
            if(url) window.open(url, '_blank');
        }

        // Dark Mode Toggle Logic
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('modeBtn');
            if (document.body.classList.contains('dark-mode')) {
                btn.innerHTML = "☀️ Light";
            } else {
                btn.innerHTML = "🌙 Dark";
            }
        }
    </script>
</body>
</html>
