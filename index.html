<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #008080; /* Original Windows Teal */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Original Window Frame */
        .window {
            background-color: #c0c0c0;
            border-top: 2px solid #dfdfdf;
            border-left: 2px solid #dfdfdf;
            border-right: 2px solid #000000;
            border-bottom: 2px solid #000000;
            width: 350px;
            padding: 2px;
        }

        /* Classic Blue Title Bar */
        .title-bar {
            background-color: #000080;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 14px;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
        }

        /* Screen Area */
        #display-screen {
            background-color: #ffffff;
            border: 2px inset #808080;
            margin: 10px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            height: 40px;
        }

        /* Original Beveled Buttons */
        .btn-container {
            padding: 10px;
            text-align: center;
        }

        button {
            background-color: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            font-family: sans-serif;
            font-size: 12px;
            padding: 5px 15px;
            margin: 5px;
            outline: none;
            cursor: pointer;
        }

        button:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>MY_OLD_APP.EXE</span>
        <span style="background:#c0c0c0; color:black; padding:0 3px; font-size:10px; border:1px solid black;">X</span>
    </div>
    
    <div id="display-screen">SYSTEM READY...</div>

    <div class="btn-container">
        <button onclick="run('FILE OPENED')">OPEN</button>
        <button onclick="run('SAVING DATA...')">SAVE</button>
        <button onclick="run('REBOOTING...')">REBOOT</button>
        <button onclick="run('SYSTEM READY')">RESET</button>
    </div>
</div>

<script>
    function run(msg) {
        document.getElementById('display-screen').innerText = msg;
    }
</script>

</body>
</html>
