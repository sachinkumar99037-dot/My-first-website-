<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - HDHub Style</title>
    <style>
        /* CSS yahan direct daal raha hoon taaki aapko ek hi file manage karni pade */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: white; }
        header { background-color: #1f1f1f; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e50914; }
        .logo { font-size: 26px; font-weight: bold; color: #fff; }
        .logo span { color: #e50914; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px 5%; }
        .movie-card { background: #1f1f1f; border-radius: 8px; overflow: hidden; transition: 0.3s; border: 1px solid #333; }
        .movie-card:hover { transform: translateY(-5px); border-color: #e50914; }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; }
        .card-info h3 { font-size: 14px; margin: 5px 0; }
        .btn { background: #e50914; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; font-size: 12px; display: inline-block; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Movie<span>Hub</span></div>
        <div style="color: #aaa;">HD Movies Download</div>
    </header>

    <div class="movie-grid">
        <div class="movie-card">
            <img src="https://via.placeholder.com/200x300" alt="Poster">
            <div class="card-info">
                <h3>Pathaan (2023)</h3>
                <p style="font-size: 11px; color: #888;">Hindi | 720p</p>
                <a href="#" class="btn">Download</a>
            </div>
        </div>
        <div class="movie-card">
            <img src="https://via.placeholder.com/200x300" alt="Poster">
            <div class="card-info">
                <h3>Avatar 2</h3>
                <p style="font-size: 11px; color: #888;">English | 1080p</p>
                <a href="#" class="btn">Download</a>
            </div>
        </div>
    </div>

</body>
</html>
